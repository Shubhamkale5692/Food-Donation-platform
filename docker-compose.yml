
services:
  db:
    image: postgres:15-alpine
    container_name: foodbridge_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foodbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - foodbridge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:6-alpine
    container_name: foodbridge_redis
    ports:
      - "6379:6379"
    networks:
      - foodbridge-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodbridge_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=foodbridge
      - CELERY_BROKER_URL=redis://redis:6379/0
    networks:
      - foodbridge-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodbridge_celery
    command: celery -A app.workers.tasks worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=foodbridge
      - CELERY_BROKER_URL=redis://redis:6379/0
    networks:
      - foodbridge-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodbridge_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - foodbridge-network
    depends_on:
      - backend

networks:
  foodbridge-network:
    driver: bridge

volumes:
  postgres_data:
